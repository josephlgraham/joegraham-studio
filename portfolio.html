// ============================================================
// STATE
// ============================================================
let displayOrder = [];
let sortDir = null; // null = shuffled, 'asc' = oldest first, 'desc' = newest first

// ============================================================
// SHUFFLE / SORT
// ============================================================
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shufflePortfolio() {
  sortDir = null;
  const btn = document.getElementById('sortBtn');
  btn.classList.remove('active');
  btn.textContent = '🕐';
  displayOrder = shuffleArray([...Array(portfolio.length).keys()]);
  renderGrid();
}

function toggleChronSort() {
  sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
  const btn = document.getElementById('sortBtn');
  btn.classList.add('active');
  if (sortDir === 'asc') {
    btn.textContent = '🕐 ↑';
    displayOrder = [...Array(portfolio.length).keys()];
  } else {
    btn.textContent = '🕐 ↓';
    displayOrder = [...Array(portfolio.length).keys()].reverse();
  }
  renderGrid();
}

// ============================================================
// RENDER GRID
// ============================================================
function renderGrid() {
  const grid = document.getElementById('masonryGrid');
  grid.innerHTML = '';

  displayOrder.forEach((idx, displayIdx) => {
    const photo = portfolio[idx];
    const item = document.createElement('div');
    item.className = 'masonry-item';
    item.onclick = () => openLightbox(displayIdx);

    if (photo.src) {
      const thumbSrc = photo.src.replace('photos/', 'photos/thumbs/').replace('.png', '.jpg');
      const img = document.createElement('img');
      img.src = thumbSrc;
      img.alt = photo.alt;
      img.className = 'loading';
      img.onload = () => img.classList.replace('loading', 'loaded');
      img.onerror = () => {
        // If image fails to load, show placeholder
        item.innerHTML = `<div class="masonry-placeholder">📷<br>${photo.title}<br><span style="font-size:8px;">image not found</span></div>`;
        // Re-attach overlay
        const overlay = document.createElement('div');
        overlay.className = 'masonry-overlay';
        overlay.innerHTML = `<div class="masonry-title">${photo.title}</div>${photo.location ? '<div class="masonry-location">📍 ' + photo.location + '</div>' : ''}`;
        item.appendChild(overlay);
      };
      item.appendChild(img);
    } else {
      item.innerHTML = `<div class="masonry-placeholder">📷<br>${photo.title}</div>`;
    }

    const overlay = document.createElement('div');
    overlay.className = 'masonry-overlay';
    overlay.innerHTML = `<div class="masonry-title">${photo.title}</div>${photo.location ? '<div class="masonry-location">📍 ' + photo.location + '</div>' : ''}`;
    item.appendChild(overlay);

    grid.appendChild(item);
  });

  const countLabel = sortDir === 'asc' ? 'oldest first' : sortDir === 'desc' ? 'newest first' : 'shuffled fresh each visit';
  document.getElementById('photoCount').textContent = portfolio.length + ' photographs · ' + countLabel;
}

// ============================================================
// LIGHTBOX
// ============================================================
let currentIndex = 0;

function openLightbox(displayIdx) {
  currentIndex = displayIdx;
  showPhoto();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function showPhoto() {
  const idx = displayOrder[currentIndex];
  const photo = portfolio[idx];
  const img = document.getElementById('lightboxImg');

  if (photo.src) {
    img.src = photo.src;
    img.alt = photo.alt;
  } else {
    img.src = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450">' +
      '<rect width="600" height="450" fill="%23223"/>' +
      '<text x="300" y="210" text-anchor="middle" fill="%23778" font-size="22" font-family="sans-serif">' +
      photo.title + '</text></svg>'
    );
  }

  document.getElementById('lightboxCaption').textContent = photo.caption || photo.title;
  document.getElementById('lightboxLocation').textContent =
    (photo.location ? '📍 ' + photo.location : '') +
    (photo.camera ? (photo.location ? ' · ' : '') + '📷 ' + photo.camera : '');
  document.getElementById('galleryCounter').textContent = (currentIndex + 1) + ' of ' + displayOrder.length;
}

function nextPhoto() { currentIndex = (currentIndex + 1) % displayOrder.length; showPhoto(); }
function prevPhoto() { currentIndex = (currentIndex - 1 + displayOrder.length) % displayOrder.length; showPhoto(); }

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') nextPhoto();
  if (e.key === 'ArrowLeft') prevPhoto();
});
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });

// ============================================================
// SPARKLE TRAIL
// ============================================================
const sparkleChars = ['✨','⭐','💫','✦','✧','⋆'];
let sparkleThrottle = 0;
document.addEventListener('mousemove', function(e) {
  const now = Date.now();
  if (now - sparkleThrottle < 80) return;
  sparkleThrottle = now;
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = sparkleChars[Math.floor(Math.random()*sparkleChars.length)];
  s.style.left = (e.clientX+(Math.random()-0.5)*16)+'px';
  s.style.top = (e.clientY+(Math.random()-0.5)*16)+'px';
  s.style.fontSize = (8+Math.random()*10)+'px';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 800);
});

// ============================================================
// INIT
// ============================================================
displayOrder = shuffleArray([...Array(portfolio.length).keys()]);
renderGrid();
</script>
