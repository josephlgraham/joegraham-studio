// ============================================================
// RENDER
// ============================================================
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function renderJournal() {
  const list = document.getElementById('journalList');
  list.innerHTML = '';

  const sorted = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));

  sorted.forEach(entry => {
    const a = document.createElement('a');
    a.className = 'journal-entry';
    a.href = 'photos/' + entry.slug + '.html';

    a.innerHTML = `
      <div class="journal-entry-thumb">
        ${entry.image
          ? `<img src="${entry.image.replace('photos/', 'photos/thumbs/').replace('.png', '.jpg')}" alt="${entry.title}" loading="lazy">`
          : `<div class="journal-entry-placeholder">📷</div>`
        }
      </div>
      <div class="journal-entry-copy">
        <div class="journal-entry-title">${entry.title}</div>
        <div class="journal-entry-meta">📍 ${entry.location} · ${formatDate(entry.date)}</div>
        <div class="journal-entry-preview">${entry.preview}</div>
      </div>
    `;

    list.appendChild(a);
  });

  document.getElementById('entryCount').textContent = entries.length + ' entries';
}

renderJournal();

// Sparkle trail
const sparkleChars = ['✨','⭐','💫','✦','✧','⋆'];
let sparkleThrottle = 0;
document.addEventListener('mousemove', function(e) {
  const now = Date.now();
  if (now - sparkleThrottle < 80) return;
  sparkleThrottle = now;
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = sparkleChars[Math.floor(Math.random()*sparkleChars.length)];
  s.style.left = (e.clientX+(Math.random()-0.5)*16)+'px';
  s.style.top = (e.clientY+(Math.random()-0.5)*16)+'px';
  s.style.fontSize = (8+Math.random()*10)+'px';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 800);
});
